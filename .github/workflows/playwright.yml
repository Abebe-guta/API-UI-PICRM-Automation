name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      # CHANGE: added required env vars — testData.js requireEnv() throws
      # immediately if any of these are absent, killing the suite before
      # a single test runs. Store these as GitHub Actions secrets.
      BASE_URL:       ${{ secrets.BASE_URL }}
      LOGIN_USERNAME: ${{ secrets.LOGIN_USERNAME }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      # FIX: split into two steps to prevent hang after browser download.
      # --with-deps runs apt-get which can block on interactive prompts in CI.
      # DEBIAN_FRONTEND=noninteractive suppresses those prompts entirely.
      # Installing deps first ensures the environment is ready before
      # the browser extraction phase starts.
      - name: Install Playwright system dependencies
        run: DEBIAN_FRONTEND=noninteractive npx playwright install-deps

      - name: Install Playwright browsers
        run: npx playwright install chromium

      # CHANGE: added .auth directory creation before globalSetup runs —
      # globalSetup saves token.json here; base.fixture.js reads it back.
      # Without this the directory may not exist and the write will fail.
      - name: Create .auth directory
        run: mkdir -p .auth

      # CHANGE: split into two explicit steps so API runs before UI.
      # UI tests (segment.e2e.spec.js) depend on the app state that
      # API tests exercise — running them in parallel or reversed causes
      # UI failures unrelated to the UI code.
      - name: Run API tests
        run: npx playwright test --project=API

      - name: Run UI tests
        run: npx playwright test --project=UI

      # CHANGE: upload both projects' reports together.
      # `if: always()` is cleaner than `!cancelled()` — ensures the report
      # is captured even when a test step fails (which is when you need it most).
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30