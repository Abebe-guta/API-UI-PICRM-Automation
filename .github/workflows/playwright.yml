name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      BASE_URL:       ${{ secrets.BASE_URL }}
      LOGIN_USERNAME: ${{ secrets.LOGIN_USERNAME }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      # FIX: replaced microsoft/playwright-github-action@v1 — that action
      # is abandoned (last updated 2021) and does not recognise ubuntu-latest
      # which is now Ubuntu 24.04, causing "Cannot install dependencies for
      # this linux distribution!" and aborting before browsers are installed.
      #
      # Solution: install only the Chromium shared libraries directly via
      # apt-get. This is the exact set Playwright's own CI uses for Chrome.
      # No apt interactive prompts, no lock contention, no version mismatch.
      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-0 \
            libnss3 \
            libnspr4 \
            libdbus-1-3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpango-1.0-0 \
            libcairo2 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxext6

      # Download only Chromium — no Firefox, no WebKit, no system dep logic.
      # Playwright's install step is now purely a browser download + extraction.
      - name: Install Playwright Chromium
        run: npx playwright install chromium

      # .auth directory must exist before globalSetup writes token.json
      - name: Create .auth directory
        run: mkdir -p .auth

      # API must run before UI — UI tests depend on app state that
      # API tests set up
      - name: Run API tests
        run: npx playwright test --project=API

      - name: Run UI tests
        run: npx playwright test --project=UI

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30