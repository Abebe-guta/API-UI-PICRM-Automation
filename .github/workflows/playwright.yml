name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      BASE_URL:       ${{ secrets.BASE_URL }}
      LOGIN_USERNAME: ${{ secrets.LOGIN_USERNAME }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      # FIX: replaced all manual browser install approaches with the
      # official Playwright GitHub Action.
      #
      # WHY the previous approaches hung:
      #   npx playwright install --with-deps  → apt-get blocks on prompts
      #   DEBIAN_FRONTEND=noninteractive install-deps  → still hangs on
      #   some ubuntu-latest runner versions due to dpkg lock contention
      #
      # The official action handles OS deps, download, and extraction
      # internally in a CI-safe way with built-in caching — no hang.
      - name: Install Playwright browsers
        uses: microsoft/playwright-github-action@v1

      # .auth directory must exist before globalSetup writes token.json
      - name: Create .auth directory
        run: mkdir -p .auth

      # API must run before UI — UI tests depend on app state that
      # API tests set up. Wrong order causes false UI failures.
      - name: Run API tests
        run: npx playwright test --project=API

      - name: Run UI tests
        run: npx playwright test --project=UI

      # always() ensures report is captured even when tests fail —
      # that's exactly when you need it most
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30